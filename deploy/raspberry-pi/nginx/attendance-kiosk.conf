# attendance-management-app — nginx（キオスク用）
# 配置: /etc/nginx/sites-available/attendance-kiosk
# インストール後: sed -i "s|__INSTALL_ROOT__|/opt/attendance-management-app|g" このファイル

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # vite build 出力（INSTALL_ROOT を sed で置換）
    root __INSTALL_ROOT__/frontend/dist;
    index index.html;

    client_max_body_size 64k;

    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
